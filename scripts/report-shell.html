<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
  /* Notion-like: warm neutrals, single column, soft callouts, no heavy chrome */
  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --text: #37352f;
    --muted: rgba(55, 53, 47, 0.65);
    --faint: rgba(55, 53, 47, 0.09);
    --code-bg: rgba(55, 53, 47, 0.06);

    --p0: #eb5757;
    --p1: #d9a006;
    --p2: #2eaadc;

    --radius: 4px;
    --radius-lg: 6px;
    --content: 720px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { color-scheme: light; }
  body {
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, "Apple Color Emoji", Arial, sans-serif;
    font-size: 16px;
    line-height: 1.6;
    color: var(--text);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  a {
    color: var(--text);
    text-decoration: underline;
    text-underline-offset: 2px;
    text-decoration-color: rgba(55, 53, 47, 0.35);
  }
  a:hover { text-decoration-color: rgba(55, 53, 47, 0.55); }

  .container {
    max-width: var(--content);
    margin: 0 auto;
    padding: 40px 20px 80px;
  }
  .paper {
    background: transparent;
    padding: 0;
  }

  /* Typography — calm hierarchy */
  h1 {
    font-size: 1.875rem;
    font-weight: 700;
    line-height: 1.25;
    letter-spacing: -0.02em;
    margin: 0 0 0.5em;
  }
  h2 {
    font-size: 1.25rem;
    font-weight: 600;
    line-height: 1.35;
    margin: 1.75em 0 0.4em;
    padding-top: 0.15em;
  }
  h3 {
    font-size: 1.05rem;
    font-weight: 600;
    line-height: 1.4;
    margin: 1.35em 0 0.35em;
  }
  p { margin: 0.5em 0; }
  strong { font-weight: 600; }
  em { color: var(--muted); font-style: italic; }

  hr {
    border: none;
    border-top: 1px solid var(--faint);
    margin: 1.5em 0;
  }

  /* Inline & block code */
  code {
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    font-size: 0.9em;
    background: var(--code-bg);
    padding: 0.15em 0.4em;
    border-radius: var(--radius);
  }
  pre {
    background: var(--surface);
    border: 1px solid var(--faint);
    border-radius: var(--radius-lg);
    padding: 12px 14px;
    overflow: auto;
    margin: 0.85em 0;
    font-size: 0.88em;
  }
  pre code {
    background: transparent;
    padding: 0;
    border-radius: 0;
    font-size: inherit;
  }

  /* Lists */
  ul, ol { padding-left: 1.5rem; margin: 0.5em 0; }
  li { margin: 0.25em 0; }
  li::marker { color: var(--muted); }

  /* Blockquote — Notion callout feel */
  blockquote {
    border-left: 3px solid var(--faint);
    background: rgba(55, 53, 47, 0.03);
    border-radius: 0 var(--radius-lg) var(--radius-lg) 0;
    padding: 10px 14px;
    margin: 0.85em 0;
    color: var(--muted);
  }

  /* Tables — simple lines */
  .table-wrap {
    overflow: auto;
    margin: 0.85em 0;
    border-radius: var(--radius-lg);
    border: 1px solid var(--faint);
    background: var(--surface);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.94rem;
    min-width: 560px;
  }
  th, td {
    border-bottom: 1px solid var(--faint);
    padding: 8px 12px;
    text-align: left;
    vertical-align: top;
  }
  th {
    background: rgba(55, 53, 47, 0.03);
    font-weight: 600;
    font-size: 0.92em;
    color: var(--muted);
  }
  tr:last-child td { border-bottom: none; }

  /* Images */
  figure { margin: 0.85em 0; }
  img {
    max-width: 100%;
    height: auto;
    border-radius: var(--radius-lg);
    border: 1px solid var(--faint);
    background: var(--surface);
  }
  figcaption {
    margin-top: 6px;
    font-size: 0.875rem;
    color: var(--muted);
    line-height: 1.45;
  }

  /* Severity — soft accent, not loud */
  .severity-p0 { color: var(--p0); font-weight: 600; }
  .severity-p1 { color: var(--p1); font-weight: 600; }
  .severity-p2 { color: var(--p2); font-weight: 600; }

  .score {
    font-size: 1.65rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  /* Finding — callout strip, not a card */
  .finding {
    border: none;
    border-radius: var(--radius-lg);
    padding: 12px 14px 12px 16px;
    margin: 1em 0;
    background: rgba(55, 53, 47, 0.03);
  }
  .finding h3 { margin-top: 0; }
  .finding-p0 { border-left: 3px solid var(--p0); background: rgba(235, 87, 87, 0.06); }
  .finding-p1 { border-left: 3px solid var(--p1); background: rgba(217, 160, 6, 0.08); }
  .finding-p2 { border-left: 3px solid var(--p2); background: rgba(46, 170, 220, 0.07); }

  /* Side-by-side screenshots (ưu tiên class, tránh inline màu lệch theme) */
  .img-pair {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin: 1rem 0;
  }
  .img-pair figure { margin: 0; }
  .img-pair img { width: 100%; }
  .img-frame-p0 { border: 1px solid rgba(235, 87, 87, 0.45) !important; }
  .img-frame-p1 { border: 1px solid rgba(217, 160, 6, 0.45) !important; }
  .img-frame-p2 { border: 1px solid var(--faint) !important; }

  @media print {
    :root { --bg: #fff; }
    body { background: #fff; }
    .container { padding: 0; max-width: none; }
    .finding { break-inside: avoid; }
    img { max-height: 420px; }
    a { text-decoration: none; color: var(--text); }
  }
</style>
</head>
<body>
  <div class="container">
    <main class="paper">
      {{CONTENT}}
    </main>
  </div>
</body>
</html>
